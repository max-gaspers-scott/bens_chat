name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Runs whenever you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bens_chat2-app:latest
          no-cache: true

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Only runs if the build succeeds
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            LOGFILE=~/chat2/deploy.log
            echo "===== Deploy started: $(date -u) =====" >> $LOGFILE

            cd ~/chat2
            echo "-- Pulling images --" >> $LOGFILE
            docker compose -f prod.yaml pull 2>&1 | tee -a $LOGFILE


            echo "-- Stopping old containers --" >> $LOGFILE
            docker compose -f prod.yaml down --remove-orphans 2>&1 | tee -a $LOGFILE

            echo "-- Starting containers --" >> $LOGFILE
            docker compose -f prod.yaml up -d --force-recreate 2>&1 | tee -a $LOGFILE

            echo "-- Running image --" >> $LOGFILE
            docker inspect bens_chat2_app --format='Image: {{.Image}}  Created: {{.Created}}' 2>&1 | tee -a $LOGFILE

            echo "-- Pruning old images --" >> $LOGFILE
            docker image prune -f 2>&1 | tee -a $LOGFILE
            echo "===== Deploy finished: $(date -u) =====" >> $LOGFILE

